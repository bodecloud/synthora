[project]
name = "synthora-sdk"
version = "0.1.0"
description = "Synthora Python client SDK"
requires-python = ">=3.11"
dependencies = ["httpx>=0.27", "websockets>=12.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/synthora"]
