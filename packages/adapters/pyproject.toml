[project]
name = "synthora-adapters"
version = "0.1.0"
description = "Synthora provider abstractions: LLMs, search engines, search strategies, MCP bridge"
requires-python = ">=3.11"
dependencies = [
    "synthora-core",
    "httpx>=0.27",
    "defusedxml>=0.7",
    "langchain-mcp-adapters>=0.1",
    "litellm>=1.0",
    "llm-fallbacks @ git+https://github.com/bodecloud/llm_fallbacks.git@6168474b818ba19560f7630ba1442e01c64f4671",
]

[tool.uv.sources]
synthora-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/synthora"]

[tool.hatch.metadata]
allow-direct-references = true
