[project]
name = "synthora-orchestration"
version = "0.1.0"
description = "Synthora research OS: LangGraph pipelines, supervisor/researcher graphs, pipeline registry"
requires-python = ">=3.11"
dependencies = [
    "synthora-core",
    "synthora-adapters",
    "synthora-intelligence",
    "langgraph>=0.4",
    "langchain-core>=0.3",
    "langgraph-checkpoint-postgres>=2.0",
    # Binary wheel bundles libpq — required in slim images without system libpq.
    "psycopg[binary]>=3.2",
]

[tool.uv.sources]
synthora-core = { workspace = true }
synthora-adapters = { workspace = true }
synthora-intelligence = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/synthora"]
