[project]
name = "synthora-persistence"
version = "0.1.0"
description = "Synthora persistence: SQLAlchemy models, repositories, migrations"
requires-python = ">=3.11"
dependencies = [
    "synthora-core",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "aiosqlite>=0.20",
]

[tool.uv.sources]
synthora-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/synthora"]
